name: 'RustChain Mining Status Badge'
description: 'Display a live RustChain mining status badge in your repository README'
inputs:
  wallet:
    description: 'Your RustChain miner wallet name'
    required: true
  readme-path:
    description: 'Path to README file to update'
    required: false
    default: 'README.md'
runs:
  using: 'node16'
  main: 'index.js'
branding:
  icon: 'shield'
  color: 'green'